name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install git-cliff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo orhun/git-cliff --pattern '*x86_64-unknown-linux-gnu.tar.gz' --output git-cliff.tar.gz
          tar xzf git-cliff.tar.gz
          sudo mv git-cliff-*/git-cliff /usr/local/bin/

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $TAG"

      - name: Generate changelog
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git-cliff --tag "$TAG" --latest -o CHANGELOG.md

      - name: Build binaries
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          mkdir -p dist
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )
          for platform in "${platforms[@]}"; do
            IFS='/' read -r os arch <<< "$platform"
            output="dist/lsm-${os}-${arch}"
            if [ "$os" = "windows" ]; then
              output="${output}.exe"
            fi
            echo "Building $os/$arch..."
            GOOS="$os" GOARCH="$arch" go build \
              -ldflags="-s -w -X github.com/llbbl/lsm/internal/cmd.Version=$TAG" \
              -o "$output" ./cmd/lsm
          done

      - name: Create checksums
        run: |
          cd dist
          sha256sum lsm-* > checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --notes-file CHANGELOG.md
