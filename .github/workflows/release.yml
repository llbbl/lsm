name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install git-cliff
        run: |
          curl -sSL https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv git-cliff /usr/local/bin/

      - name: Determine next version
        id: version
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest=$latest_tag" >> "$GITHUB_OUTPUT"

          # Parse current version
          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"

          # Check commit messages since last tag for bump type
          commits=$(git log "$latest_tag"..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if echo "$commits" | grep -qE "^feat(\(.+\))?!:|^fix(\(.+\))?!:|^refactor(\(.+\))?!:|BREAKING CHANGE"; then
            major=$((major + 1))
            minor=0
            patch=0
          elif echo "$commits" | grep -qE "^feat(\(.+\))?:"; then
            minor=$((minor + 1))
            patch=0
          else
            patch=$((patch + 1))
          fi

          next="v${major}.${minor}.${patch}"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next"

      - name: Generate changelog
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next }}
        run: |
          git-cliff --tag "$NEXT_VERSION" -o CHANGELOG.md

      - name: Build binaries
        run: |
          mkdir -p dist
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )
          for platform in "${platforms[@]}"; do
            IFS='/' read -r os arch <<< "$platform"
            output="dist/lsm-${os}-${arch}"
            if [ "$os" = "windows" ]; then
              output="${output}.exe"
            fi
            echo "Building $os/$arch..."
            GOOS="$os" GOARCH="$arch" go build -ldflags="-s -w" -o "$output" ./cmd/lsm
          done

      - name: Create checksums
        run: |
          cd dist
          sha256sum lsm-* > checksums.txt

      - name: Create tag
        env:
          TAG: ${{ steps.version.outputs.next }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.next }}
        run: |
          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --notes-file CHANGELOG.md
